name: Build & Distribute

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and distribute, e.g. v1.0.0
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/flop7/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: macos-arm64
            asset: flop7-macos-arm64.tar.gz
          - runner: macos-13
            target: macos-x86_64
            asset: flop7-macos-x86_64.tar.gz
          - runner: ubuntu-latest
            target: linux-x86_64
            asset: flop7-linux-x86_64.tar.gz
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and PyInstaller
        run: pip install . pyinstaller

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name flop7
          --collect-all flop7
          src/flop7/__main__.py

      - name: Create tarball
        run: tar -czf ${{ matrix.asset }} -C dist flop7

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ matrix.asset }}

  update-brew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          gh release download "$TAG" \
            --repo benhalladay08/flop7 \
            --pattern "flop7-*.tar.gz" \
            --dir assets

      - name: Compute checksums
        id: shas
        run: |
          cd assets
          echo "macos_arm64=$(sha256sum flop7-macos-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$(sha256sum flop7-macos-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum flop7-linux-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: benhalladay08/homebrew-flop7
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Generate formula
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          SHA_MACOS_ARM64: ${{ steps.shas.outputs.macos_arm64 }}
          SHA_MACOS_X86_64: ${{ steps.shas.outputs.macos_x86_64 }}
          SHA_LINUX_X86_64: ${{ steps.shas.outputs.linux_x86_64 }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          BASE_URL="https://github.com/benhalladay08/flop7/releases/download/${VERSION}"

          mkdir -p tap/Formula

          cat > tap/Formula/flop7.rb << FORMULA
          class Flop7 < Formula
            desc "An unofficial Flip 7 terminal emulator"
            homepage "https://github.com/benhalladay08/flop7"
            version "${CLEAN_VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/flop7-macos-arm64.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              else
                url "${BASE_URL}/flop7-macos-x86_64.tar.gz"
                sha256 "${SHA_MACOS_X86_64}"
              end
            end

            on_linux do
              url "${BASE_URL}/flop7-linux-x86_64.tar.gz"
              sha256 "${SHA_LINUX_X86_64}"
            end

            def install
              bin.install "flop7"
            end

            test do
              assert_predicate bin/"flop7", :executable?
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: tap
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/flop7.rb
          git commit -m "flop7 ${VERSION#v}"
          git push
